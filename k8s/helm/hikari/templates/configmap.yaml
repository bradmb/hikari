{{- if .Values.fieldMappings.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hikari.fullname" . }}-field-mappings
  labels:
    {{- include "hikari.labels" . | nindent 4 }}
data:
  field-mappings.json: |-
    {{- .Values.fieldMappings.config | toPrettyJson | nindent 4 }}
{{- end }}
