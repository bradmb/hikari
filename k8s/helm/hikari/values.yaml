replicaCount: 2
revisionHistoryLimit: 5

nameOverride: hikari
fullnameOverride: hikari

image:
  repository: registry.example.com/hikari
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: hikari

deployment:
  reason: ""
  timestamp: ""
  triggeredBy: ""

podAnnotations: {}

env:
  awsRegion: us-east-1
  victoriaUrl: http://victorialogs.example.svc:9428
  fieldMappingsFile: /app/config/field-mappings.json
  facetPreviewLimit: 10
  openAiSecretId: kubernetes/hikari/openai
  openAiSecretName: ""
  openAiSecretKey: OPENAI_API_KEY
  openAiModel: gpt-5.4-mini
  mcpAllowedHosts: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

tolerations:
  - operator: Exists
    effect: NoSchedule

nodeSelector: {}
affinity: {}

fieldMappings:
  enabled: true
  config:
    defaultFields:
      - environment
      - service
      - service.name
      - service_name
      - host
      - hostname
      - host.name
      - host_name
      - MachineName
      - level
      - severity_text
      - severityText
      - level_name
      - levelName
      - source
      - status
      - client
      - kubernetes.pod_namespace
      - kubernetes.pod_name
      - kubernetes.pod_node_name
      - kubernetes.node_name
      - kubernetes.container_name
      - kubernetes.pod_labels.app.kubernetes.io/name
      - kubernetes.pod_labels.k8s-app
      - kubernetes.pod_labels.app
    aliases:
      environment:
        - environment
        - env
        - Environment
      service:
        - service
        - service.name
        - service_name
        - app
        - kubernetes.pod_labels.app.kubernetes.io/name
        - kubernetes.pod_labels.k8s-app
        - kubernetes.pod_labels.app
        - kubernetes.pod_labels.app.kubernetes.io/component
        - kubernetes.container_name
        - source
      host:
        - host
        - hostname
        - host.name
        - host_name
        - MachineName
        - kubernetes.pod_node_name
        - kubernetes.node_name
      hostname:
        - hostname
        - host
        - host.name
        - host_name
        - MachineName
        - kubernetes.pod_node_name
        - kubernetes.node_name
      level:
        - level
        - Level
        - severity
        - severity_text
        - severityText
        - level_name
        - levelName
      kubernetes.pod_namespace:
        - kubernetes.pod_namespace
        - namespace
      kubernetes.pod_name:
        - kubernetes.pod_name
        - pod
    derivedFields:
      level:
        - type: json
          sources: [_msg, message, msg, log]
          path: level
        - type: json
          sources: [_msg, message, msg, log]
          path: Level
        - type: json
          sources: [_msg, message, msg, log]
          path: severity
        - type: json
          sources: [_msg, message, msg, log]
          path: severity_text
        - type: json
          sources: [_msg, message, msg, log]
          path: severityText
        - type: json
          sources: [_msg, message, msg, log]
          path: level_name
        - type: json
          sources: [_msg, message, msg, log]
          path: levelName
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '"level"\s*:\s*"(?:fatal|critical|error|err)"'
          queryPattern: '\x22level\x22[[:space:]]*:[[:space:]]*\x22(?:fatal|critical|error|err)\x22'
          flags: i
          value: error
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '"level"\s*:\s*"warn(?:ing)?"'
          queryPattern: '\x22level\x22[[:space:]]*:[[:space:]]*\x22warn(ing)?\x22'
          flags: i
          value: warning
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '"level"\s*:\s*"info(?:rmation)?"'
          queryPattern: '\x22level\x22[[:space:]]*:[[:space:]]*\x22info(rmation)?\x22'
          flags: i
          value: info
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '"level"\s*:\s*"(?:debug|trace|verbose)"'
          queryPattern: '\x22level\x22[[:space:]]*:[[:space:]]*\x22(?:debug|trace|verbose)\x22'
          flags: i
          value: debug
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^[EF]\d{4}\s+\d{2}:\d{2}:\d{2}'
          queryPattern: '^[EF][0-9]{4}[[:space:]]+[0-9]{2}:[0-9]{2}:[0-9]{2}'
          value: error
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^W\d{4}\s+\d{2}:\d{2}:\d{2}'
          queryPattern: '^W[0-9]{4}[[:space:]]+[0-9]{2}:[0-9]{2}:[0-9]{2}'
          value: warning
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^I\d{4}\s+\d{2}:\d{2}:\d{2}'
          queryPattern: '^I[0-9]{4}[[:space:]]+[0-9]{2}:[0-9]{2}:[0-9]{2}'
          value: info
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '(^|[\s\[])(fatal|critical|error|err)([\]\s:|,-]|$)|\serror='
          queryPattern: '(^|[[:space:]]|[[])(fatal|critical|error|err)([]]|[[:space:]]|:|[|]|,|-|$)|[[:space:]]error='
          flags: i
          value: error
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '(^|[\s\[])(warning|warn)([\]\s:|,-]|$)|\swarning='
          queryPattern: '(^|[[:space:]]|[[])(warning|warn)([]]|[[:space:]]|:|[|]|,|-|$)|[[:space:]]warning='
          flags: i
          value: warning
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '(^|[\s\[])(info|information)([\]\s:|,-]|$)'
          queryPattern: '(^|[[:space:]]|[[])(info|information)([]]|[[:space:]]|:|[|]|,|-|$)'
          flags: i
          value: info
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '(^|[\s\[])(debug|trace|verbose)([\]\s:|,-]|$)'
          queryPattern: '(^|[[:space:]]|[[])(debug|trace|verbose)([]]|[[:space:]]|:|[|]|,|-|$)'
          flags: i
          value: debug
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^\S+\s+\[[^\]]+\]\s+\S+\s+\S+\s+[-\d/]+\s+5\d\d\s+'
          queryPattern: '^[^[:space:]]+[[:space:]]+[[][^]]+[]][[:space:]]+[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+[-0-9/]+[[:space:]]+5[0-9][0-9][[:space:]]+'
          value: error
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^\S+\s+\[[^\]]+\]\s+\S+\s+\S+\s+[-\d/]+\s+4\d\d\s+'
          queryPattern: '^[^[:space:]]+[[:space:]]+[[][^]]+[]][[:space:]]+[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+[-0-9/]+[[:space:]]+4[0-9][0-9][[:space:]]+'
          value: warning
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '^\S+\s+\[[^\]]+\]\s+\S+\s+\S+\s+[-\d/]+\s+[123]\d\d\s+'
          queryPattern: '^[^[:space:]]+[[:space:]]+[[][^]]+[]][[:space:]]+[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+[-0-9/]+[[:space:]]+[123][0-9][0-9][[:space:]]+'
          value: info
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '\bHTTP/\d(?:\.\d)?\s+5\d\d\b'
          queryPattern: 'HTTP/[0-9]([.][0-9])?[[:space:]]+5[0-9][0-9]'
          flags: i
          value: error
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '\bHTTP/\d(?:\.\d)?\s+4\d\d\b'
          queryPattern: 'HTTP/[0-9]([.][0-9])?[[:space:]]+4[0-9][0-9]'
          flags: i
          value: warning
        - type: regex
          sources: [_msg, message, msg, log]
          pattern: '\bHTTP/\d(?:\.\d)?\s+[123]\d\d\b'
          queryPattern: 'HTTP/[0-9]([.][0-9])?[[:space:]]+[123][0-9][0-9]'
          flags: i
          value: info
    facets:
      - field: environment
        label: Environment
      - field: service
        label: Service
        summary: true
      - field: host
        label: Host
        summary: true
      - field: level
        label: Level
        summary: true
      - field: source
        label: Source
      - field: kubernetes.pod_namespace
        key: namespace
        label: Namespace
        summary: true
      - field: kubernetes.pod_name
        key: pod
        label: Pod
        summary: true
