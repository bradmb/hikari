replicaCount: 2
revisionHistoryLimit: 5

nameOverride: hikari
fullnameOverride: hikari

image:
  repository: registry.example.com/hikari
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: hikari

deployment:
  reason: ""
  timestamp: ""
  triggeredBy: ""

podAnnotations: {}

env:
  awsRegion: us-east-1
  victoriaUrl: http://victorialogs.example.svc:9428
  fieldMappingsFile: /app/config/field-mappings.json
  facetPreviewLimit: 10
  openAiSecretId: kubernetes/hikari/openai
  openAiSecretName: ""
  openAiSecretKey: OPENAI_API_KEY
  openAiModel: gpt-5.4-mini
  mcpAllowedHosts: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

tolerations:
  - operator: Exists
    effect: NoSchedule

nodeSelector: {}
affinity: {}

fieldMappings:
  enabled: true
  config:
    defaultFields:
      - environment
      - service
      - service.name
      - service_name
      - host
      - hostname
      - host.name
      - host_name
      - MachineName
      - level
      - severity_text
      - severityText
      - level_name
      - levelName
      - source
      - status
      - client
      - kubernetes.pod_namespace
      - kubernetes.pod_name
      - kubernetes.pod_node_name
      - kubernetes.node_name
      - kubernetes.container_name
      - kubernetes.pod_labels.app.kubernetes.io/name
      - kubernetes.pod_labels.k8s-app
      - kubernetes.pod_labels.app
    aliases:
      environment:
        - environment
        - env
        - Environment
      service:
        - service
        - service.name
        - service_name
        - app
        - kubernetes.pod_labels.app.kubernetes.io/name
        - kubernetes.pod_labels.k8s-app
        - kubernetes.pod_labels.app
        - kubernetes.pod_labels.app.kubernetes.io/component
        - kubernetes.container_name
        - source
      host:
        - host
        - hostname
        - host.name
        - host_name
        - MachineName
        - kubernetes.pod_node_name
        - kubernetes.node_name
      hostname:
        - hostname
        - host
        - host.name
        - host_name
        - MachineName
        - kubernetes.pod_node_name
        - kubernetes.node_name
      level:
        - level
        - Level
        - severity
        - severity_text
        - severityText
        - level_name
        - levelName
      kubernetes.pod_namespace:
        - kubernetes.pod_namespace
        - namespace
      kubernetes.pod_name:
        - kubernetes.pod_name
        - pod
    facets:
      - field: environment
        label: Environment
      - field: service
        label: Service
        summary: true
      - field: host
        label: Host
        summary: true
      - field: level
        label: Level
        summary: true
      - field: source
        label: Source
      - field: kubernetes.pod_namespace
        key: namespace
        label: Namespace
        summary: true
      - field: kubernetes.pod_name
        key: pod
        label: Pod
        summary: true
