services:
  mock-victorialogs:
    image: python:3.13-slim
    working_dir: /mock
    command: sh -c "pip install -r requirements.txt && uvicorn victorialogs_mock:app --host 0.0.0.0 --port 9428 --reload"
    volumes:
      - ./mock:/mock
    ports:
      - "9428:9428"

  hikari:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HIKARI_VICTORIA_URL: http://mock-victorialogs:9428
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - mock-victorialogs

  api:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn hikari_api.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      HIKARI_VICTORIA_URL: http://mock-victorialogs:9428
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      - mock-victorialogs

  web:
    image: node:24-alpine
    working_dir: /web
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./web:/web
    ports:
      - "5173:5173"
    depends_on:
      - api
